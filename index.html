<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Archie — AI Life Coach</title>
<meta name="description" content="Your personal AI life coach — design your week, track your goals, build the life you want."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  window.dataLayer=window.dataLayer||[];

  gtag('js',new Date());
  function trackEvent(n,p){
    if(localStorage.getItem('archie_consent')==='granted') gtag('event',n,p||{});
  }
  if(localStorage.getItem('archie_consent')==='granted') gtag('config','G-XXXXXXXXXX',{anonymize_ip:true});

<style>
:root {
  --bg:        #050d1a;
  --surface:   #0b1628;
  --surface2:  #0f1e35;
  --surface3:  #14263f;
  --border:    rgba(26,106,255,0.12);
  --border2:   rgba(26,106,255,0.25);
  --blue:      #1a6aff;
  --cyan:      #00d4ff;
  --green:     #00e5a0;
  --orange:    #ff8c42;
  --pink:      #ff4d8d;
  --text:      #e8edf5;
  --muted:     #6b7fa3;
  --muted2:    #3d4f6e;
  --grad:      linear-gradient(135deg,#1a6aff,#00d4ff);
  --grad-btn:  linear-gradient(135deg,#1a6aff,#0047d4);
  --r:         12px;
  --rl:        18px;
  --sidebar:   252px;
  --font-h:    'Barlow Condensed',sans-serif;
  --font-b:    'Outfit',sans-serif;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:var(--font-b);font-size:14.5px;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow:hidden;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:rgba(26,106,255,0.25);border-radius:10px;}
button{cursor:pointer;font-family:var(--font-b);}
textarea,input{font-family:var(--font-b);}
textarea{resize:none;}

/* Grid texture */
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(26,106,255,0.04) 1px,transparent 1px),
  linear-gradient(90deg,rgba(26,106,255,0.04) 1px,transparent 1px);
  background-size:40px 40px;}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(26,106,255,0.07) 0%,transparent 70%);}

/* CONSENT */
#consent{
  position:fixed;bottom:0;left:0;right:0;z-index:9000;
  background:var(--surface2);border-top:1px solid var(--border2);
  padding:14px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;
  box-shadow:0 -8px 32px rgba(0,0,0,0.5);animation:slideUp .35s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
#consent p{font-size:12.5px;color:var(--muted);flex:1;min-width:180px;line-height:1.5;}
#consent p a{color:var(--blue);}
.c-btns{display:flex;gap:8px;}
.c-acc{background:var(--grad-btn);color:#fff;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;border:none;}
.c-dec{background:transparent;border:1px solid var(--border2);color:var(--muted);padding:8px 14px;border-radius:8px;font-size:13px;}
.c-acc:hover{opacity:.88;} .c-dec:hover{color:var(--text);}

/* APP */
#app{display:flex;height:100vh;position:relative;z-index:1;}

/* SIDEBAR */
.sb{width:var(--sidebar);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;height:100vh;overflow-y:auto;}
.sb-head{padding:20px 18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:11px;}
.sb-mark{width:36px;height:36px;border-radius:9px;flex-shrink:0;background:var(--grad-btn);
  display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 20px rgba(26,106,255,0.3);}
.sb-name{font-family:var(--font-h);font-size:21px;font-weight:800;letter-spacing:.03em;
  background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sb-tag{font-size:9.5px;color:var(--muted2);letter-spacing:.1em;text-transform:uppercase;margin-top:-1px;}

.sb-sec{padding:16px 18px 5px;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2);font-weight:600;}

.nav{width:100%;display:flex;align-items:center;gap:10px;padding:9px 18px;
  background:transparent;border:none;border-left:2px solid transparent;
  color:var(--muted);font-size:13px;font-weight:400;text-align:left;transition:all .15s;}
.nav:hover{color:var(--text);background:rgba(26,106,255,0.06);}
.nav.on{color:var(--text);background:rgba(26,106,255,0.1);border-left-color:var(--blue);font-weight:600;}
.nav-ic{font-size:15px;width:19px;text-align:center;flex-shrink:0;}

.sb-streak{margin:auto 14px 14px;
  background:linear-gradient(135deg,rgba(26,106,255,0.1),rgba(0,212,255,0.05));
  border:1px solid var(--border2);border-radius:var(--r);padding:14px;}
.sk-lbl{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.sk-num{font-family:var(--font-h);font-size:40px;font-weight:900;line-height:1;
  background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sk-sub{font-size:11px;color:var(--muted);margin-top:3px;}
.sk-bar{height:3px;background:var(--surface3);border-radius:3px;margin-top:10px;overflow:hidden;}
.sk-fill{height:100%;background:var(--grad);border-radius:3px;transition:width .5s ease;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);height:58px;
  padding:0 24px;display:flex;align-items:center;gap:14px;flex-shrink:0;}
.tb-title{font-family:var(--font-h);font-size:21px;font-weight:700;letter-spacing:.03em;flex:1;}
.tb-status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--green);
  box-shadow:0 0 7px var(--green);animation:blink 2.5s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* MESSAGES */
.msgs{flex:1;overflow-y:auto;padding:24px 24px 12px;scroll-behavior:smooth;}
.msgs::-webkit-scrollbar{width:4px;}
.mrow{display:flex;gap:12px;margin-bottom:18px;animation:mIn .28s ease;}
@keyframes mIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.mrow.user{flex-direction:row-reverse;}
.mav{width:34px;height:34px;border-radius:9px;flex-shrink:0;margin-top:2px;
  background:var(--grad-btn);display:flex;align-items:center;justify-content:center;
  font-size:16px;box-shadow:0 2px 10px rgba(26,106,255,0.3);}
.mbub{max-width:72%;padding:12px 16px;font-size:14px;line-height:1.7;border-radius:var(--rl);}
.mrow.assistant .mbub{background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--rl) var(--rl) var(--rl) 4px;}
.mrow.user .mbub{background:linear-gradient(135deg,#0c2a6b,#0a3d5c);
  border:1px solid rgba(26,106,255,0.22);
  border-radius:var(--rl) var(--rl) 4px var(--rl);
  box-shadow:0 2px 14px rgba(26,106,255,0.12);}
.mbub strong,.mbub b{color:var(--cyan);font-weight:600;}
.mbub h3{font-family:var(--font-h);font-size:15px;font-weight:700;color:var(--text);
  margin:10px 0 5px;letter-spacing:.03em;}
.mbub ul,.mbub ol{padding-left:17px;margin:5px 0;}
.mbub li{margin-bottom:3px;}
.mbub p{margin-bottom:7px;}
.mbub p:last-child{margin-bottom:0;}
.mbub hr{border:none;border-top:1px solid var(--border);margin:10px 0;}

/* Typing */
.trow{display:flex;gap:12px;margin-bottom:18px;}
.tbub{background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--rl) var(--rl) var(--rl) 4px;padding:13px 16px;
  display:flex;gap:5px;align-items:center;}
.td{width:6px;height:6px;border-radius:50%;background:var(--blue);animation:tdB 1.2s infinite;}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes tdB{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* Affiliate */
.aff-wrap{padding-left:46px;margin-bottom:6px;}
.aff{display:flex;align-items:center;gap:12px;
  background:linear-gradient(135deg,rgba(26,106,255,0.07),rgba(0,212,255,0.04));
  border:1px solid rgba(26,106,255,0.18);border-radius:var(--r);
  padding:12px 14px;max-width:420px;text-decoration:none;
  transition:border-color .2s,transform .2s;}
.aff:hover{border-color:rgba(26,106,255,0.4);transform:translateX(3px);}
.aff-ic{font-size:24px;flex-shrink:0;}
.aff-tag{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);font-weight:700;margin-bottom:1px;}
.aff-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:1px;}
.aff-desc{font-size:11.5px;color:var(--muted);}
.aff-arr{margin-left:auto;color:var(--blue);font-size:16px;flex-shrink:0;}

/* INPUT */
.inpwrap{padding:12px 24px 18px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;}
.inpbox{display:flex;gap:10px;align-items:flex-end;background:var(--surface2);
  border:1px solid var(--border2);border-radius:var(--rl);padding:9px 11px;transition:border-color .2s;}
.inpbox:focus-within{border-color:rgba(26,106,255,0.45);box-shadow:0 0 0 3px rgba(26,106,255,0.07);}
.inpta{flex:1;background:transparent;border:none;color:var(--text);
  font-size:14px;line-height:1.5;max-height:110px;overflow-y:auto;}
.inpta:focus{outline:none;}
.inpta::placeholder{color:var(--muted2);}
.sbtn{width:36px;height:36px;border-radius:8px;flex-shrink:0;
  background:var(--grad-btn);color:#fff;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 10px rgba(26,106,255,0.35);transition:transform .15s,box-shadow .15s,opacity .15s;}
.sbtn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 4px 18px rgba(26,106,255,0.5);}
.sbtn:disabled{opacity:.25;cursor:default;transform:none;}
.inphint{font-size:10.5px;color:var(--muted2);text-align:center;margin-top:7px;}

/* Error toast */
#errToast{position:fixed;top:16px;right:16px;z-index:8000;
  background:#1a0a0f;border:1px solid rgba(255,77,141,0.4);border-radius:var(--r);
  padding:12px 18px;font-size:13px;color:var(--pink);max-width:340px;
  display:none;animation:mIn .3s ease;box-shadow:0 4px 24px rgba(0,0,0,0.4);}

/* MOBILE */
@media(max-width:680px){
  :root{--sidebar:100%;}
  #app{flex-direction:column;}
  .sb{width:100%;height:auto;flex-direction:row;overflow-x:auto;
    border-right:none;border-bottom:1px solid var(--border);}
  .sb-head{border-bottom:none;padding:10px 14px;}
  .sb-tag,.sb-sec,.sb-streak{display:none;}
  .nav{flex-direction:column;padding:10px 12px;gap:3px;
    font-size:10px;border-left:none;border-bottom:2px solid transparent;white-space:nowrap;}
  .nav.on{border-bottom-color:var(--blue);border-left-color:transparent;}
  .nav-ic{font-size:19px;}
  .main{height:calc(100vh - 116px);}
  .msgs{padding:14px 12px 8px;}
  .inpwrap{padding:10px 12px 14px;}
  .mbub{max-width:88%;}
}
</style>
</head>
<body>

<div id="errToast"></div>

<!-- CONSENT -->
<div id="consent" style="display:none">
  <p>We use analytics to improve your experience. Data is never sold. <a href="#">Learn more</a></p>
  <div class="c-btns">
    <button class="c-dec" onclick="setConsent('denied')">Decline</button>
    <button class="c-acc" onclick="setConsent('granted')">Accept</button>
  </div>
</div>

<!-- APP — loads immediately, no key screen -->
<div id="app">
  <nav class="sb">
    <div class="sb-head">
      <div class="sb-mark">🏗️</div>
      <div>
        <div class="sb-name">Archie</div>
        <div class="sb-tag">AI Life Coach</div>
      </div>
    </div>

    <button class="nav on" data-tab="dashboard" onclick="switchTab('dashboard',this)" style="margin-top:8px;">
      <span class="nav-ic">📅</span> Dashboard
    </button>

    <div class="sb-sec">Bonus Modules</div>
    <button class="nav" data-tab="budget" onclick="switchTab('budget',this)">
      <span class="nav-ic">💰</span> Budget Planner
    </button>
    <button class="nav" data-tab="running" onclick="switchTab('running',this)">
      <span class="nav-ic">🏃</span> Running Tracker
    </button>
    <button class="nav" data-tab="workout" onclick="switchTab('workout',this)">
      <span class="nav-ic">💪</span> Workout Routine
    </button>
    <button class="nav" data-tab="diet" onclick="switchTab('diet',this)">
      <span class="nav-ic">🥗</span> Meal Planner
    </button>
    <button class="nav" data-tab="hobby" onclick="switchTab('hobby',this)">
      <span class="nav-ic">🎯</span> Hobby Tracker
    </button>
    <button class="nav" data-tab="media" onclick="switchTab('media',this)">
      <span class="nav-ic">📚</span> Film & Books
    </button>
    <button class="nav" data-tab="social" onclick="switchTab('social',this)">
      <span class="nav-ic">🍽️</span> Restaurants
    </button>

    <div class="sb-streak">
      <div class="sk-lbl">Master Streak 🔥</div>
      <div class="sk-num" id="skNum">—</div>
      <div class="sk-sub" id="skSub">Start your week to begin</div>
      <div class="sk-bar"><div class="sk-fill" id="skFill" style="width:0%"></div></div>
    </div>
  </nav>

  <div class="main">
    <div class="topbar">
      <div class="tb-title" id="tbTitle">Weekly Dashboard</div>
      <div class="tb-status"><span class="sdot"></span><span id="tbSub">Archie is ready</span></div>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="inpwrap">
      <div class="inpbox">
        <textarea class="inpta" id="ta" rows="1"
          placeholder="Tell Archie about your week…"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"></textarea>
        <button class="sbtn" id="sbtn" onclick="send()" title="Send">↑</button>
      </div>
      <div class="inphint">Enter to send · Shift+Enter for new line</div>
    </div>
  </div>
</div>

<script>
const TABS = {
  dashboard:{ title:'Weekly Dashboard',        sub:'Design your perfect week',         ph:'Tell Archie about your week…'               },
  budget:   { title:'Budget Planner',           sub:'Clarity on your finances',         ph:'Tell Archie about your income…'             },
  running:  { title:'Running Tracker',          sub:'Build your running habit',         ph:'What are your running goals this week?'     },
  workout:  { title:'Workout Routine',          sub:'Train smart, recover well',        ph:'Tell Archie about your fitness goals…'      },
  diet:     { title:'Meal Planner',             sub:'Fuel your best self',              ph:'What does a typical day of eating look like?'},
  hobby:    { title:'Hobby Tracker',            sub:'Grow a skill you love',            ph:'What hobby are you working on?'             },
  media:    { title:'Film & Books',             sub:'Curated for your growth',          ph:'What have you been watching or reading?'    },
  social:   { title:'Restaurants & Activities', sub:'Make memories intentionally',      ph:'What kind of outings are you planning?'     },
};

const OPENERS = {
  dashboard: "Hey! I'm **Archie the Architect** 🏗️ — your personal AI life coach.\n\nLet's build your week together. **Walk me through what's in your diary** — any fixed commitments, appointments, or events — Monday to Sunday. Then we'll layer your goals on top.",
  budget:    "Let's get your finances clear 💰 No judgment — just a real picture of where things stand.\n\n**What's your monthly take-home income** after tax? And what are your biggest fixed costs — rent or mortgage, regular bills, subscriptions?",
  running:   "Let's build your running plan 🏃\n\n**What's your goal this week?** A set number of sessions, a total distance, or a combination?",
  workout:   "Time to build your routine 💪\n\n**What are your main fitness goals right now?** Think: build muscle, lose fat, improve endurance, increase mobility — or a mix. And how many days a week can you realistically commit?",
  diet:      "Let's sort your nutrition 🥗\n\n**Walk me through a typical day of eating** — breakfast, lunch, dinner, snacks. Any dietary preferences, restrictions, or specific targets I should know about?",
  hobby:     "Love that you're developing something new 🎯\n\n**What's the hobby you're working on?** And where are you right now — total beginner, some experience, or somewhere in between?",
  media:     "Let's build your reading and watching list 📚\n\n**What have you finished recently** — books, films, shows? And are you after growth, entertainment, or a mix?",
  social:    "Let's make your social time count 🍽️\n\n**What kind of outings or activities** are you thinking about? What's been on the list that keeps getting pushed back?",
};

const AFFILIATES = {
  running: [
    { ic:'👟', tag:'GEAR PICK',  title:'Nike Running — 20% off',        desc:'Cushioned trainers built for daily miles.',       url:'https://www.nike.com/gb/running' },
    { ic:'⌚', tag:'TECH PICK',  title:'Garmin Forerunner 165',          desc:'Track every run with precision GPS.',             url:'https://www.garmin.com/en-GB/' },
  ],
  workout: [
    { ic:'🏋️', tag:'KIT PICK',   title:'Gymshark Training Gear',         desc:'High-performance kit for every session.',         url:'https://www.gymshark.com/' },
    { ic:'💊', tag:'NUTRITION',  title:'MyProtein — Impact Whey',         desc:'Clean protein to support your training.',         url:'https://www.myprotein.com/' },
  ],
  diet: [
    { ic:'📦', tag:'FOOD PICK',  title:'Thrive Market — Organic Staples', desc:'Healthy groceries below supermarket prices.',     url:'https://thrivemarket.com/' },
    { ic:'🥣', tag:'MEAL PICK',  title:'Huel — Balanced Nutrition',       desc:'Complete meals built around your macros.',        url:'https://huel.com/en-gb' },
  ],
  hobby: [
    { ic:'📖', tag:'LEARNING',   title:'Skillshare — 1 Month Free',       desc:'Thousands of creative and practical classes.',    url:'https://www.skillshare.com/' },
    { ic:'🎒', tag:'LEARNING',   title:'Udemy — Top Courses on Sale',      desc:'Learn anything, lifetime access.',                url:'https://www.udemy.com/' },
  ],
  media: [
    { ic:'📚', tag:'BOOKS',      title:'Audible — 30 Day Free Trial',      desc:'Listen to any book, anywhere.',                   url:'https://www.audible.co.uk/' },
    { ic:'📖', tag:'READING',    title:'Kindle Unlimited',                 desc:'Unlimited reading for £8.99/mo.',                 url:'https://www.amazon.co.uk/kindle-dbs/hz/subscribe/ku' },
  ],
  budget: [
    { ic:'💳', tag:'FINANCE',    title:'Monzo — Smart Money App',          desc:'See exactly where every pound goes.',             url:'https://monzo.com/' },
    { ic:'📊', tag:'SAVINGS',    title:'Plum — Automated Savings',         desc:'AI that puts money aside for you automatically.', url:'https://withplum.com/' },
  ],
  social: [
    { ic:'🎭', tag:'EVENTS',     title:'Fever — Events Near You',          desc:'Discover the best local experiences.',            url:'https://feverup.com/en/london' },
    { ic:'🍽️', tag:'DINING',    title:'OpenTable — Book a Table',         desc:'Reserve the best restaurants instantly.',         url:'https://www.opentable.co.uk/' },
  ],
  dashboard: [],
};

const SYSTEM = `You are Archie the Architect, a warm, casual, motivating AI life coach. Help users design their week, set meaningful goals, track progress, and explore self-improvement modules.

Tone: friendly, encouraging, never preachy. Use light markdown — **bold** for key points, ## for section headers, bullet lists where helpful. Keep responses focused and scannable.

CORE GOAL TYPES ONLY: Fitness, Personal Development, Work/Productivity, Social, Misc.

WEEKLY DASHBOARD:
- Ask about Mon→Sun commitments first, then layer goals on top
- For each goal: type, specifics (distance/reps/pages), frequency
- Completion is binary: done or not done
- Master Streak: 1 goal missed = streak continues; 2 missed = streak freezes ❄️; 3+ missed = streak resets to 0 🔄
- When streak changes state clearly: "Your master streak is now X days" OR "Streak frozen" OR "Streak reset to 0"

BONUS MODULES — stay focused on whichever module is active:
- Budget: income → expenses → savings/debts → monthly budget + 90-day plan
- Running: goals → schedule → pace → weekly running plan
- Workout: goals → equipment → days → structured routine (sets/reps/rest)
- Meal Planner: current diet → restrictions → goals → weekly meal plan + macro tips
- Hobby: hobby → skill level → time available → practice schedule + milestones
- Film & Books: tastes → goals → curated recommendations + tracking
- Restaurants & Activities: preferences → budget → suggestions + scheduling

Always ask questions first. Generate plans only after gathering enough input.`;

/* STATE */
let activeTab = 'dashboard';
let loading = false;
let chats = {};
let streak = { days:0, status:'active' };

/* CONSENT */
function checkConsent(){
  if(!localStorage.getItem('archie_consent'))
    document.getElementById('consent').style.display='flex';
}
function setConsent(v){
  localStorage.setItem('archie_consent',v);
  document.getElementById('consent').style.display='none';
  if(v==='granted') gtag('config','G-XXXXXXXXXX',{anonymize_ip:true});
  trackEvent('consent',{choice:v});
}

/* TABS */
function switchTab(tabId, el){
  activeTab = tabId;
  document.querySelectorAll('.nav').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  const t = TABS[tabId];
  document.getElementById('tbTitle').textContent = t.title;
  document.getElementById('tbSub').textContent   = t.sub;
  document.getElementById('ta').placeholder      = t.ph;
  initTab(tabId);
  trackEvent('tab_switch',{tab:tabId});
}

function initTab(tabId){
  if(!chats[tabId]) chats[tabId]=[{role:'assistant',content:OPENERS[tabId]}];
  renderMsgs();
}

/* RENDER */
function renderMsgs(){
  const wrap = document.getElementById('msgs');
  const msgs = chats[activeTab]||[];
  wrap.innerHTML='';

  msgs.forEach(m=>{
    const row=document.createElement('div');
    row.className=`mrow ${m.role}`;
    row.innerHTML = m.role==='assistant'
      ? `<div class="mav">🏗️</div><div class="mbub">${md(m.content)}</div>`
      : `<div class="mbub">${md(m.content)}</div>`;
    wrap.appendChild(row);
  });

  if(activeTab!=='dashboard'){
    const assistantCount=msgs.filter(m=>m.role==='assistant').length;
    if(assistantCount>=2){
      const aff=getAff(activeTab,msgs.length);
      if(aff){
        const w=document.createElement('div');
        w.className='aff-wrap';
        w.innerHTML=`<a class="aff" href="${aff.url}" target="_blank" rel="noopener"
          onclick="trackEvent('affiliate_click',{tab:'${activeTab}',item:'${aff.title}'})">
          <div class="aff-ic">${aff.ic}</div>
          <div><div class="aff-tag">${aff.tag} · Suggested</div>
          <div class="aff-title">${aff.title}</div>
          <div class="aff-desc">${aff.desc}</div></div>
          <div class="aff-arr">→</div></a>`;
        wrap.appendChild(w);
      }
    }
  }

  if(loading){
    const t=document.createElement('div');
    t.className='trow';
    t.innerHTML=`<div class="mav">🏗️</div><div class="tbub"><div class="td"></div><div class="td"></div><div class="td"></div></div>`;
    wrap.appendChild(t);
  }

  wrap.scrollTop=wrap.scrollHeight;
}

function getAff(tab,msgCount){
  const list=AFFILIATES[tab]||[];
  if(!list.length) return null;
  return list[Math.floor(msgCount/3)%list.length];
}

/* STREAK */
function updateStreak(text){
  const lc=text.toLowerCase();
  const numMatch=text.match(/master streak[^0-9]*(\d+)\s*day/i)||text.match(/streak is now (\d+)/i);
  if(lc.match(/streak.{0,30}reset/))          streak={days:0,status:'reset'};
  else if(lc.match(/streak.{0,20}fro/))        streak={...streak,status:'frozen'};
  else if(numMatch)                             streak={days:parseInt(numMatch[1]),status:'active'};
  else if(streak.days===0&&(chats.dashboard||[]).length>3) streak={days:1,status:'active'};

  const numEl=document.getElementById('skNum');
  const subEl=document.getElementById('skSub');
  const fillEl=document.getElementById('skFill');
  if(streak.days===0&&streak.status==='active'){
    numEl.textContent='—'; subEl.textContent='Start your week to begin'; fillEl.style.width='0%';
  } else {
    numEl.textContent=streak.days;
    subEl.textContent=streak.status==='frozen'?'❄️ Frozen — push back!'
      :streak.status==='reset'?'🔄 Reset — rebuild!':'days in a row 🔥';
    fillEl.style.width=Math.min(streak.days*10,100)+'%';
  }
}

/* SEND */
async function send(){
  const ta=document.getElementById('ta');
  const text=ta.value.trim();
  if(!text||loading) return;

  if(!chats[activeTab]) chats[activeTab]=[{role:'assistant',content:OPENERS[activeTab]}];
  chats[activeTab].push({role:'user',content:text});
  ta.value=''; ta.style.height='auto';
  loading=true;
  document.getElementById('sbtn').disabled=true;
  renderMsgs();
  trackEvent('message_sent',{tab:activeTab});

  const contextNote=activeTab!=='dashboard'
    ? `\n\nUser is in the "${TABS[activeTab].title}" module. Stay focused on that module only.`
    : '';

  try {
    const res=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        messages: chats[activeTab].slice(-20).map(m=>({role:m.role,content:m.content})),
        contextNote
      })
    });

    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      throw new Error(err.error||`Server error ${res.status}`);
    }

    const data=await res.json();
    const reply=data.reply||'Something went wrong!';
    chats[activeTab].push({role:'assistant',content:reply});
    if(activeTab==='dashboard') updateStreak(reply);
    trackEvent('message_received',{tab:activeTab});

  } catch(e){
    showErr(e.message);
    chats[activeTab].push({role:'assistant',content:`**Something went wrong** — ${e.message}\n\nTry sending your message again.`});
  }

  loading=false;
  document.getElementById('sbtn').disabled=false;
  renderMsgs();
}

function showErr(msg){
  const t=document.getElementById('errToast');
  t.textContent=msg;
  t.style.display='block';
  setTimeout(()=>t.style.display='none',5000);
}

/* MARKDOWN */
function md(t){
  t=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t=t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/\*(.*?)\*/g,'<em>$1</em>');
  t=t.replace(/^## (.*?)$/gm,'<h3>$1</h3>');
  t=t.replace(/^### (.*?)$/gm,'<strong>$1</strong>');
  t=t.replace(/^[-•] (.*?)$/gm,'<li>$1</li>');
  t=t.replace(/(<li>[\s\S]*?<\/li>\n?)+/g,s=>`<ul>${s}</ul>`);
  t=t.replace(/^\d+\. (.*?)$/gm,'<li>$1</li>');
  t=t.replace(/^---$/gm,'<hr>');
  t=t.replace(/\n\n+/g,'</p><p>');
  t=t.replace(/\n/g,'<br>');
  t=`<p>${t}</p>`;
  t=t.replace(/<p>(<h3|<ul|<hr)/g,'$1');
  t=t.replace(/(<\/h3>|<\/ul>|<hr>)<\/p>/g,'$1');
  t=t.replace(/<p><\/p>/g,'');
  return t;
}

function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px';}

/* BOOT */
window.addEventListener('DOMContentLoaded',()=>{
  initTab('dashboard');
  checkConsent();
  trackEvent('app_open');
});
</script>
